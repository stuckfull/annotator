<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FST Annotator Demo (SPA)</title>
    <!-- minirouter for SPA navigation -->
    <script src="https://cdn.jsdelivr.net/gh/milio48/minirouter.js@main/dist/v1.1/minirouter.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-main: #334155;
            --text-light: #64748b;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary-bg: #eef2ff;
            --border-color: #e0e7ff;
            --nav-bg: #4f46e5;
            --card-bg: #ffffff;
            --success: #10b981;
            --success-hover: #059669;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            background-color: var(--nav-bg);
            color: white;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-title {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: 500;
            opacity: 0.9;
            transition: opacity 0.2s;
        }

        .nav-links a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        /* Main App Container */
        #app {
            max-width: 900px;
            margin: 2.5rem auto;
            padding: 2rem;
            background-color: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            min-height: 400px;
        }

        /* Typography */
        h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 1rem; color: #1e293b; }
        h3 { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.75rem; color: #334155; margin-top: 1.5rem; }
        p { margin-bottom: 1rem; color: var(--text-light); }
        ul { padding-left: 1.5rem; margin-bottom: 1.5rem; color: var(--text-light); }
        li { margin-bottom: 0.5rem; }
        strong { color: var(--text-main); }

        /* Code & Pre */
        .code-block {
            background-color: #1e293b;
            color: #f8fafc;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            overflow-x: auto;
            font-family: monospace;
            font-size: 0.95rem;
        }

        /* Test Area */
        .test-area {
            background-color: var(--secondary-bg);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
        }

        .test-title {
            font-weight: 600;
            color: var(--primary);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        /* Buttons */
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.3);
        }

        button:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        
        button.btn-success { background-color: var(--success); box-shadow: 0 2px 4px rgba(16, 185, 129, 0.3); }
        button.btn-success:hover { background-color: var(--success-hover); }

        /* Form */
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 500;
            color: var(--text-main);
        }
        input, select {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        /* Utilities */
        .result-text { margin-top: 1rem; font-size: 0.9rem; font-family: monospace; color: var(--primary); }
        .max-w-md { max-width: 28rem; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="nav-title">FST Annotator Demo</div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/about">About</a>
                <a href="/checkout">Checkout</a>
            </div>
        </div>
    </nav>

    <div id="app">
        <!-- SPA View Container -->
    </div>

    <!-- Panggil FST Annotator dari CDN jsDelivr -->
    <script src="https://cdn.jsdelivr.net/gh/stuckfull/annotator@main/annotator.js"></script>

    <script>
        const app = document.getElementById('app');

        const routes = {
            '/': `
                <h2>FST Annotator</h2>
                <a href="https://www.jsdelivr.com/package/gh/stuckfull/annotator" target="_blank" style="display:inline-block; margin-bottom: 1rem;">
                    <img src="https://data.jsdelivr.com/v1/package/gh/stuckfull/annotator/badge" alt="jsdelivr badge" />
                </a>
                <p>Tool <em>client-side</em> (Vanilla JS) ringan untuk <strong>Man-In-The-Middle Debugging</strong>. Mencegat event klik, mencatat <em>User Journey</em>, menangkap <em>Network Logs</em> (Fetch & XHR) secara <em>background</em>, lalu merangkumnya dalam Markdown untuk AI Prompt atau Bug Report.</p>
                <img src="ss.jpg" alt="FST Annotator Screenshot" style="max-width: 100%; border-radius: 8px; margin: 1.5rem 0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0;" />
                
                <h3>🚀 Fitur Utama</h3>
                <ul>
                    <li><strong>Intercept & Release:</strong> Jeda interaksi asli -> Tulis Anotasi -> Teruskan event agar web berjalan normal.</li>
                    <li><strong>Auto Network Logger:</strong> Merekam payload & response dari aktivitas API (SPA/SSR) secara persisten lewat <code>sessionStorage</code>.</li>
                    <li><strong>Initiator Detection:</strong> Mendeteksi apakah elemen di-render secara SSR atau dinamis di Client-Side.</li>
                </ul>

                <h3>📦 Instalasi</h3>
                <p>Tambahkan tag script ini ke dalam HTML proyek Anda:</p>
                <div class="code-block">
                    &lt;script src="https://cdn.jsdelivr.net/gh/stuckfull/annotator@main/annotator.js"&gt;&lt;/script&gt;
                </div>

                <div class="test-area">
                    <div class="test-title">💡 Area Pengujian (AJAX Interceptor)</div>
                    <p>Gunakan tombol di bawah ini untuk mensimulasikan pemanggilan API Fetch. Annotator akan mencatat request ini di background.</p>
                    <button onclick="fetchMockData()">Simulasi Request Fetch API</button>
                    <div id="fetch-result" class="result-text"></div>
                </div>

                <h3>📝 Contoh Report</h3>
                <p>Report ini langsung di-<em>generate</em> oleh FST dan di-<em>copy</em> ke clipboard Anda:</p>
                <div class="code-block" style="white-space: pre-wrap;"># AI Debugging Report
**Session:** Session 1
**Generated:** 08/07/2026, 15:30:00

### [Issue #1] Target Element
- **URL:** https://example.com/checkout
- **Initiator:** Client-Side (Dynamically Rendered)
- **Tag Name:** \`&lt;button&gt;\`
- **Selector:** \`button#submit-order.btn.btn-primary\`
- **HTML Snippet:** \`&lt;button id="submit-order" class="btn btn-primary" data-item="123"&gt;Bayar Sekarang&lt;/button&gt;\`
- **Element Text:** "Bayar Sekarang"

**Instruction / Note:**
&gt; Tombol payment stuck loading setelah user memilih metode transfer bank.

**User Journey (Before Issue):**
1. [15:29:45] **PAGE_LOAD** -&gt; \`/checkout\`
2. [15:29:48] **CLICK** -&gt; \`input[type="radio"]#bank-transfer\`
3. [15:29:50] **CLICK** -&gt; \`button#submit-order.btn.btn-primary\`

**Recent Network API Logs:** 
\`\`\`json
[
  {
    "time": "15:29:51",
    "url": "/api/payment/select",
    "method": "POST",
    "reqBody": "{\\"method\\":\\"bank_transfer\\",\\"amount\\":50000}",
    "status": 500,
    "resBody": "{\\"error\\":\\"Internal Server Error\\"}"
  }
]
\`\`\`</div>
            `,
            '/about': `
                <h2>Tentang FST Annotator</h2>
                <p>Coba klik tombol <strong>FST</strong> melayang di pojok kanan bawah untuk mengaktifkan <em>Mode Inspect</em>.</p>
                <p>Setelah aktif, arahkan kursor (hover) ke elemen mana saja di halaman ini. Klik elemen tersebut untuk menambahkan anotasi bug atau catatan perbaikan.</p>
                <p>Gunakan tombol <strong>Save & Release</strong> jika Anda ingin menyimpan catatan dan membiarkan elemen melanjutkan event aslinya secara natural.</p>
            `,
            '/checkout': `
                <h2>Halaman Checkout</h2>
                <form id="checkout-form" onsubmit="event.preventDefault(); simulateXHR();" class="max-w-md">
                    <div class="form-group">
                        <label>Nama Lengkap</label>
                        <input type="text" value="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Metode Pembayaran</label>
                        <select>
                            <option>Kartu Kredit</option>
                            <option>Transfer Bank</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-success" style="width: 100%;">Bayar Sekarang (Test XHR)</button>
                </form>
                <div id="xhr-result" class="result-text"></div>
            `
        };

        // Inisialisasi Minirouter dengan Hash Mode
        const router = new minirouterjs('', true);

        router.set('/', () => { app.innerHTML = routes['/']; });
        router.set('/about', () => { app.innerHTML = routes['/about']; });
        router.set('/checkout', () => { app.innerHTML = routes['/checkout']; });

        router.setNotFound((params) => {
            app.innerHTML = `<h2 style="color: #dc2626;">404 Not Found</h2><p>Halaman ${params} tidak ditemukan.</p>`;
        });

        // Fungsi Simulasi FETCH
        window.fetchMockData = async () => {
            const resultEl = document.getElementById('fetch-result');
            resultEl.innerText = "Loading data...";
            try {
                const res = await fetch('https://jsonplaceholder.typicode.com/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: 'foo', body: 'bar', userId: 1 })
                });
                const data = await res.json();
                resultEl.innerText = "Fetch Berhasil! Response ID: " + data.id;
            } catch (err) {
                resultEl.innerText = "Error mengambil data.";
            }
        };

        // Fungsi Simulasi XMLHttpRequest (Legacy)
        window.simulateXHR = () => {
            const resultEl = document.getElementById('xhr-result');
            resultEl.innerText = "Processing XHR...";
            const xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://jsonplaceholder.typicode.com/posts', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onload = function() {
                if(xhr.status === 201) {
                    const data = JSON.parse(xhr.responseText);
                    resultEl.innerText = "XHR Berhasil! Response ID: " + data.id;
                }
            };
            xhr.send(JSON.stringify({ payment: 'Transfer Bank', amount: 50000 }));
        };
    </script>
</body>
</html>
